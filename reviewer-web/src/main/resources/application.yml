server:
  port: 8081

spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

governanceplus:
  # AI-assist config (governanceplus.model.*) has moved to the reviewer-ai
  # module, which isn't a reviewer-web dependency for now — see reviewer-ai's
  # pom.xml. Nothing here reads governanceplus.model.* until that changes.
  rules:
    # Resolved relative to the working directory the jar/process is started
    # from. Default assumes `reviewer-web/` as the working directory (e.g.
    # `mvn spring-boot:run` from inside reviewer-web), so this resolves to
    # <repo-root>/rules/rules.json. Override with an absolute path otherwise.

    # The single, authoritative rules.json: XML rules (id/category/severity/xpath),
    # pomRules (dependency-version checks), and swaggerRules (JSONPath checks
    # against OpenAPI specs) — consumed by the deterministic
    # com.governanceplus.reviewer.ruleengine rule engine, and read/written by
    # RulesFileStore for the Rules management UI. See rules/rules.json.example
    # for the expected shape; that file is illustrative only, not a real ruleset.
    path: ../rules/rules.json
  jobs:
    ttl-minutes: 1200
