openapi: 3.0.0
info:
  title: Order API
  version: "1.0.0"
paths:
  /orders:
    get:
      summary: Retrieve an order
      responses:
        "200":
          description: Order found
        "404":
          description: Order not found
  /orders/{id}/cancel:
    post:
      summary: Cancel an order
      responses:
        "200":
          description: Order cancelled
